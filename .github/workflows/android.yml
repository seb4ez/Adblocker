name: Android CI (Compilación Automática)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código fuente del repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configurar el entorno de Java (Tu proyecto usa la versión 11)
    - name: Configurar JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    # 3. Dar permisos de ejecución al script de Gradle
    - name: Conceder permisos de ejecución a gradlew
      run: chmod +x gradlew

    # 4. Crear un archivo .env falso para que no falle la compilación en la nube
    # (Tu build.gradle.kts busca las propiedades de Secrets a través de .env)
    - name: Crear archivo .env temporal
      run: |
        echo "GEMINI_API_KEY=dummy_key_for_ci" > .env

    # 5. Compilar la aplicación en modo Debug (No requiere firmas reales)
    - name: Compilar APK de pruebas (Debug)
      run: ./gradlew assembleDebug

    # 6. Guardar el archivo APK resultante como un artefacto descargable
    - name: Subir APK compilado
      uses: actions/upload-artifact@v4
      with:
        name: NetShield-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
