name: Android CI (Compilación Automática)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código fuente del repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configurar el entorno de Java (Tu proyecto usa la versión 11)
    - name: Configurar JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 3. Configurar Gradle global automáticamente (Evita depender de gradlew)
    - name: Configurar Gradle del Sistema
      uses: gradle/actions/setup-gradle@v4

    # 4. Crear archivos .env temporales para que no fallen los secretos de AI Studio
    - name: Crear archivo .env temporal
      run: |
        echo "GEMINI_API_KEY=dummy_key_for_ci" > .env
        if [ -d "Adblocker-main" ]; then
          echo "GEMINI_API_KEY=dummy_key_for_ci" > Adblocker-main/.env
        fi

    # 5. Compilar la aplicación usando Gradle directamente
    - name: Compilar APK de pruebas (Debug)
      run: |
        if [ -d "Adblocker-main" ]; then
          cd Adblocker-main && gradle assembleDebug
        else
          gradle assembleDebug
        fi

    # 6. Buscar y guardar el archivo APK resultante
    - name: Subir APK compilado
      uses: actions/upload-artifact@v4
      with:
        name: NetShield-Debug-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
        retention-days: 7
