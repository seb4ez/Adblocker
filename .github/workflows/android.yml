name: Android CI (Compilación Automática)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código fuente del repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configurar el entorno de Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Configurar Gradle del Sistema
    - name: Configurar Gradle del Sistema
      uses: gradle/actions/setup-gradle@v4

    # 4. Crear archivos .env temporales para burlar la verificación de claves de IA
    - name: Crear archivo .env temporal
      run: |
        echo "GEMINI_API_KEY=dummy_key_for_ci" > .env
        if [ -d "Adblocker-main" ]; then
          echo "GEMINI_API_KEY=dummy_key_for_ci" > Adblocker-main/.env
        fi

    # 5. Generar un archivo de firma digital debug.keystore temporal y seguro
    - name: Generar debug.keystore temporal
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        if [ -d "Adblocker-main" ]; then
          cp debug.keystore Adblocker-main/debug.keystore
        fi

    # 6. Compilar la aplicación usando Gradle directamente
    - name: Compilar APK de pruebas (Debug)
      run: |
        if [ -d "Adblocker-main" ]; then
          cd Adblocker-main && gradle assembleDebug
        fi

    # 7. Buscar y guardar el archivo APK resultante
    - name: Subir APK compilado
      uses: actions/upload-artifact@v4
      with:
        name: NetShield-Debug-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
        retention-days: 7
