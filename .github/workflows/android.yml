name: Android CI (Compilación Automática)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código fuente del repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configurar el entorno de Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Configurar Gradle del Sistema
    - name: Configurar Gradle del Sistema
      uses: gradle/actions/setup-gradle@v4

    # 4. Crear archivo .env de configuración temporal
    - name: Crear archivo .env temporal
      run: echo "GEMINI_API_KEY=dummy_key_for_ci" > .env

    # 5. Generar el archivo de firma digital debug.keystore en la raíz
    - name: Generar debug.keystore temporal
      run: keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    # 6. Compilar la aplicación directamente en la raíz principal
    - name: Compilar APK de pruebas (Debug)
      run: gradle assembleDebug

    # 7. Subir el archivo APK compilado a tus artefactos de GitHub
    - name: Subir APK compilado
      uses: actions/upload-artifact@v4
      with:
        name: NetShield-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
